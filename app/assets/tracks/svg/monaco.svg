<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Track outline - Street circuit -->
  <path d="M 80 40 L 120 50 L 140 80 L 130 120 L 150 140 L 140 180 L 100 200 L 60 180 L 50 140 L 70 120 L 60 80 Z" fill="none" stroke="#444" stroke-width="2"/>

  <!-- Sector 1 (Rojo) -->
  <path d="M 80 40 L 120 50 L 140 80 L 130 120" fill="none" stroke="#FF0000" stroke-width="4" opacity="0.8"/>
  <text x="120" y="70" font-size="12" fill="#FF0000">S1</text>

  <!-- Sector 2 (Amarillo) -->
  <path d="M 130 120 L 150 140 L 140 180 L 100 200" fill="none" stroke="#FFD700" stroke-width="4" opacity="0.8"/>
  <text x="130" y="160" font-size="12" fill="#FFD700">S2</text>

  <!-- Sector 3 (Verde) -->
  <path d="M 100 200 L 60 180 L 50 140 L 70 120 L 60 80 L 80 40" fill="none" stroke="#00FF00" stroke-width="4" opacity="0.8"/>
  <text x="60" y="110" font-size="12" fill="#00FF00">S3</text>

  <!-- Start/Finish -->
  <circle cx="80" cy="40" r="3" fill="white"/>
  <text x="75" y="30" font-size="10" fill="white" font-weight="bold">S/F</text>
</svg>