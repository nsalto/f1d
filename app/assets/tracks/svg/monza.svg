<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Track outline - Fast oval -->
  <ellipse cx="100" cy="100" rx="70" ry="50" fill="none" stroke="#444" stroke-width="2"/>
  <path d="M 60 80 Q 50 100 60 120" fill="none" stroke="#444" stroke-width="2"/>

  <!-- Sector 1 (Rojo) -->
  <path d="M 100 50 L 170 100" fill="none" stroke="#FF0000" stroke-width="4" opacity="0.8"/>
  <text x="140" y="65" font-size="12" fill="#FF0000">S1</text>

  <!-- Sector 2 (Amarillo) -->
  <path d="M 170 100 L 100 150" fill="none" stroke="#FFD700" stroke-width="4" opacity="0.8"/>
  <text x="140" y="135" font-size="12" fill="#FFD700">S2</text>

  <!-- Sector 3 (Verde) -->
  <path d="M 100 150 L 30 100 L 100 50" fill="none" stroke="#00FF00" stroke-width="4" opacity="0.8"/>
  <text x="50" y="100" font-size="12" fill="#00FF00">S3</text>

  <!-- Start/Finish -->
  <circle cx="100" cy="50" r="3" fill="white"/>
  <text x="95" y="40" font-size="10" fill="white" font-weight="bold">S/F</text>
</svg>